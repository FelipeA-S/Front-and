<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Temperatura</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f6f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2ddd6;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1a1916;
      letter-spacing: -0.02em;
    }

    .fields {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b6760;
    }

    input {
      width: 100%;
      padding: 0.75rem 0.875rem;
      font-family: 'DM Mono', monospace;
      font-size: 1.15rem;
      border: 1.5px solid #e2ddd6;
      border-radius: 10px;
      outline: none;
      color: #1a1916;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #93b4f7;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .separator {
      font-size: 1.2rem;
      color: #c9c4bc;
      padding-top: 1.4rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Conversor de Temperatura</h1>

    <div class="fields">
      <div class="field">
        <label for="celsius">Celsius (°C)</label>
        <input type="number" id="celsius" placeholder="0.00" step="0.1" />
      </div>

      <span class="separator">⇄</span>

      <div class="field">
        <label for="fahrenheit">Fahrenheit (°F)</label>
        <input type="number" id="fahrenheit" placeholder="0.00" step="0.1" />
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
